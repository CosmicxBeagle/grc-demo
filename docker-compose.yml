version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
#  GRC Demo — local Docker Compose
#  Usage:
#    docker compose up --build          # first run
#    docker compose up -d               # subsequent runs (detached)
#    docker compose down -v             # stop and wipe volumes
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: grc_demo
      POSTGRES_USER: grc
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-grc_local_dev_pw}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc -d grc_demo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://grc:${POSTGRES_PASSWORD:-grc_local_dev_pw}@db:5432/grc_demo
      CORS_ORIGINS: "http://localhost:3002"
      APP_ENV: local
      DEMO_AUTH_ENABLED: "true"
      ENABLE_API_DOCS: "true"
      SESSION_SECRET: local-dev-session-secret-change-me
      SESSION_COOKIE_NAME: session
      SESSION_TIMEOUT_MINUTES: "60"
      AUTH_RATE_LIMIT_ATTEMPTS: "10"
      AUTH_RATE_LIMIT_WINDOW_SECONDS: "60"
      APP_NAME: GRC Demo
      EVIDENCE_UPLOAD_DIR: /app/data/evidence
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - evidence_data:/app/data/evidence

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000   # server-side proxy target
    ports:
      - "3002:3000"
    depends_on:
      - backend

volumes:
  pgdata:
  evidence_data:
