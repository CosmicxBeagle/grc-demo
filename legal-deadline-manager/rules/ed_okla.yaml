# E.D. Oklahoma (Eastern District of Oklahoma) Local Rules
# Mirrors N.D. Oklahoma structure with judge-specific discretion.
jurisdiction: ed_okla
name: Eastern District of Oklahoma Local Civil Rules
court_name: "U.S. District Court, Eastern District of Oklahoma"
holiday_set: federal

rules:
  - key: ed_okla_response_dispositive
    label: Response to Dispositive Motion Due (E.D. Okla.)
    description: Response to summary judgment or motion to dismiss is due within 21 days after service.
    trigger_key: dispositive_motion_filed_date
    offset_days: 21
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 70
    citation: "E.D. Okla. LCvR 7.1"

  - key: ed_okla_reply_dispositive
    label: Reply Brief Due (E.D. Okla.)
    description: Reply to response to dispositive motion is due within 14 days after service of response.
    trigger_key: dispositive_motion_response_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 71
    citation: "E.D. Okla. LCvR 7.1"

  - key: ed_okla_response_nondispositive
    label: Response to Non-Dispositive Motion Due (E.D. Okla.)
    description: Response to non-dispositive motion due within 14 days after service.
    trigger_key: nondispositive_motion_filed_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 72
    citation: "E.D. Okla. LCvR 7.1"
