# ============================================================
# N.D. Oklahoma (Northern District of Oklahoma) Local Rules
# U.S. District Court for the Northern District of Oklahoma
# Oknd.uscourts.gov — Local Civil Rules (LCvR)
# Last reviewed: 2025
#
# These rules SUPPLEMENT FRCP — do not duplicate FRCP entries here.
# Holiday set: federal (no state holidays for federal filings)
# ============================================================

jurisdiction: nd_okla
name: Northern District of Oklahoma Local Civil Rules
court_name: "U.S. District Court, Northern District of Oklahoma"
holiday_set: federal

# ── Motion Briefing (LCvR 7.2) ────────────────────────────────────────────
rules:

  - key: nd_okla_response_dispositive
    label: Response to Dispositive Motion Due (N.D. Okla.)
    description: >
      Under N.D. Okla. LCvR 7.2(e), a response to a dispositive motion (motion
      to dismiss, summary judgment, etc.) must be filed within 21 days after
      service of the motion.
    trigger_key: dispositive_motion_filed_date
    offset_days: 21
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 70
    citation: "N.D. Okla. LCvR 7.2(e)"

  - key: nd_okla_reply_dispositive
    label: Reply Brief to Dispositive Motion Due (N.D. Okla.)
    description: >
      Under N.D. Okla. LCvR 7.2(f), a reply brief to a response to a dispositive
      motion must be filed within 14 days after service of the response.
    trigger_key: dispositive_motion_response_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 71
    citation: "N.D. Okla. LCvR 7.2(f)"

  - key: nd_okla_response_nondispositive
    label: Response to Non-Dispositive Motion Due (N.D. Okla.)
    description: >
      Under N.D. Okla. LCvR 7.2(e), a response to a non-dispositive motion must
      be filed within 14 days after service of the motion.
    trigger_key: nondispositive_motion_filed_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 72
    citation: "N.D. Okla. LCvR 7.2(e)"

  # ── Standard Scheduling Order Intervals (working backward from trial) ──
  # These are DEFAULTS used when the scheduling order is silent on a date.
  # N.D. Okla. scheduling orders typically set these as explicit dates.
  # Only fall back to these intervals if the order does not specify.

  - key: nd_okla_pretrial_conference
    label: Final Pretrial Conference
    description: >
      N.D. Okla. scheduling orders typically set the final pretrial conference
      approximately 30 days before the trial date.
    trigger_key: trial_date
    offset_days: 30
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 80
    citation: "N.D. Okla. LCvR 16.1"
    notes: >
      Actual date is always set by the scheduling order. This interval is a
      fallback default only.

  - key: nd_okla_pretrial_order_due
    label: Proposed Pretrial Order Due (N.D. Okla.)
    description: >
      Under N.D. Okla. LCvR 16.1, the parties' proposed pretrial order is
      typically due 14 days before the final pretrial conference.
    trigger_key: pretrial_conference_date
    offset_days: 14
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 81
    citation: "N.D. Okla. LCvR 16.1"

  - key: nd_okla_discovery_cutoff
    label: Discovery Cutoff (N.D. Okla. Default)
    description: >
      N.D. Okla. scheduling orders typically close discovery approximately 90 days
      before the trial date. The actual date is always set by the scheduling order.
    trigger_key: trial_date
    offset_days: 90
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 90
    citation: "N.D. Okla. LCvR 16.1 (default interval)"
    notes: Use scheduling_order date if available — this is a fallback default only.

  - key: nd_okla_sj_motion_deadline
    label: Dispositive Motion Deadline (N.D. Okla.)
    description: >
      N.D. Okla. scheduling orders typically set the dispositive motion deadline
      at or shortly after the discovery cutoff date.
    trigger_key: discovery_cutoff_date
    offset_days: 0
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 91
    citation: "N.D. Okla. LCvR 16.1 (default interval)"
    notes: Use scheduling_order date if available — this is a fallback default only.

  - key: nd_okla_plaintiff_expert_default
    label: Plaintiff Expert Disclosure Deadline (N.D. Okla. Default)
    description: >
      N.D. Okla. scheduling orders typically set plaintiff expert disclosures
      approximately 180-240 days before the trial date. This is a default
      fallback; the scheduling order date always controls.
    trigger_key: trial_date
    offset_days: 180
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 95
    citation: "N.D. Okla. LCvR 16.1 (default interval)"
    notes: Use scheduling_order date if available — this is a fallback default only.

  - key: nd_okla_defendant_expert_default
    label: Defendant Expert Disclosure Deadline (N.D. Okla. Default)
    description: >
      N.D. Okla. scheduling orders typically set defendant expert disclosures
      approximately 150 days before the trial date (30 days after plaintiff experts).
    trigger_key: trial_date
    offset_days: 150
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 96
    citation: "N.D. Okla. LCvR 16.1 (default interval)"
    notes: Use scheduling_order date if available — this is a fallback default only.

  - key: nd_okla_rebuttal_expert_default
    label: Rebuttal Expert Disclosure Deadline (N.D. Okla. Default)
    description: >
      N.D. Okla. scheduling orders typically set rebuttal expert disclosures
      approximately 120 days before the trial date.
    trigger_key: trial_date
    offset_days: 120
    direction: before
    roll_forward: false
    is_critical: false
    display_order: 97
    citation: "N.D. Okla. LCvR 16.1 (default interval)"
    notes: Use scheduling_order date if available — this is a fallback default only.
