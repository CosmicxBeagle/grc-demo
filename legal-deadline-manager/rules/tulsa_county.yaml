# ============================================================
# Tulsa County District Court Local Rules
# Oklahoma's 14th Judicial District
# State court — uses Oklahoma state holidays
# Last reviewed: 2025
# ============================================================

jurisdiction: tulsa_county
name: Tulsa County District Court Local Rules
court_name: "District Court of Tulsa County, Oklahoma"
holiday_set: oklahoma_state   # Includes federal + Oklahoma state holidays

rules:

  - key: tulsa_answer
    label: Answer to Petition Due (Tulsa County)
    description: >
      Under 12 O.S. § 2012(A), a defendant must answer or otherwise plead
      within 20 days after service of the petition and summons.
    trigger_key: service_of_petition
    offset_days: 20
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 10
    citation: "12 O.S. § 2012(A)"

  - key: tulsa_response_motion
    label: Response to Motion Due (Tulsa County — General)
    description: >
      Tulsa County local rules generally allow 15 days to respond to a
      motion, though individual judges may set different deadlines.
      Always check the specific judge's standing orders.
    trigger_key: motion_filed_date
    offset_days: 15
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 20
    citation: "Tulsa County Dist. Ct. Local Rules"
    notes: >
      Some judges require 21 days. Verify with the judge's chambers or
      standing orders. This is a safe minimum — add to calendar promptly.

  - key: tulsa_discovery_response
    label: Discovery Responses Due (Tulsa County)
    description: >
      Under 12 O.S. § 3233, responses to interrogatories, requests for
      production, and requests for admission are due within 30 days of service.
      Under 12 O.S. § 3230, depositions require reasonable notice (no fixed day count).
    trigger_key: discovery_served_date
    offset_days: 30
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 30
    citation: "12 O.S. §§ 3230, 3233"

  - key: tulsa_pretrial_conference
    label: Pretrial Conference (Tulsa County)
    description: >
      Tulsa County judges typically set the pretrial conference 30-60 days
      before the trial date. The actual date is always set by the judge's order.
    trigger_key: trial_date
    offset_days: 45
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 40
    citation: "12 O.S. § 2116 / Judge's scheduling order"
    notes: Actual date set by court order. This is a default reminder interval only.
