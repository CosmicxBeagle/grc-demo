# ============================================================
# W.D. Arkansas (Western District of Arkansas) Local Rules
# U.S. District Court for the Western District of Arkansas
# Last reviewed: 2025
# ============================================================

jurisdiction: wd_ark
name: Western District of Arkansas Local Civil Rules
court_name: "U.S. District Court, Western District of Arkansas"
holiday_set: federal

rules:

  - key: wd_ark_response_nondispositive
    label: Response to Non-Dispositive Motion Due (W.D. Ark.)
    description: >
      Under W.D. Ark. Local Rule 7.2(b), a response to a non-dispositive motion
      must be filed within 14 days after service of the motion.
    trigger_key: nondispositive_motion_filed_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 20
    citation: "W.D. Ark. LR 7.2(b)"

  - key: wd_ark_response_dispositive
    label: Response to Dispositive Motion Due (W.D. Ark.)
    description: >
      Under W.D. Ark. Local Rule 7.2(b), a response to a dispositive motion
      (e.g., summary judgment) must be filed within 21 days after service.
    trigger_key: dispositive_motion_filed_date
    offset_days: 21
    direction: after
    roll_forward: true
    is_critical: true
    display_order: 21
    citation: "W.D. Ark. LR 7.2(b)"

  - key: wd_ark_reply_dispositive
    label: Reply Brief to Dispositive Motion Due (W.D. Ark.)
    description: >
      Under W.D. Ark. Local Rule 7.2(c), a reply to a summary judgment response
      must be filed within 14 days after service of the response.
    trigger_key: dispositive_motion_response_date
    offset_days: 14
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 22
    citation: "W.D. Ark. LR 7.2(c)"

  - key: wd_ark_reply_nondispositive
    label: Reply Brief to Non-Dispositive Motion Due (W.D. Ark.)
    description: >
      Under W.D. Ark. Local Rule 7.2(c), a reply to a non-dispositive motion
      response must be filed within 7 days after service of the response.
    trigger_key: nondispositive_motion_response_date
    offset_days: 7
    direction: after
    roll_forward: true
    is_critical: false
    display_order: 23
    citation: "W.D. Ark. LR 7.2(c)"

  - key: wd_ark_discovery_cutoff_default
    label: Discovery Cutoff (W.D. Ark. Default)
    description: >
      W.D. Ark. scheduling orders typically close discovery approximately 90 days
      before trial. Actual date always set by scheduling order.
    trigger_key: trial_date
    offset_days: 90
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 50
    citation: "W.D. Ark. LR 16.1"
    notes: Use scheduling_order date if available.

  - key: wd_ark_sj_deadline_default
    label: Summary Judgment Deadline (W.D. Ark. Default)
    description: >
      W.D. Ark. scheduling orders typically set the dispositive motion deadline
      approximately 60 days before trial.
    trigger_key: trial_date
    offset_days: 60
    direction: before
    roll_forward: false
    is_critical: true
    display_order: 51
    citation: "W.D. Ark. LR 16.1"
    notes: Use scheduling_order date if available.
